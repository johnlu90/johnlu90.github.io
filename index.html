<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sky the Cat</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(#e6f7ff, #ffffff);
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
    }

    .card {
      background: white;
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      max-width: 500px;
    }

    h1 {
      margin-top: 0;
      font-size: 2.5em;
    }

    p {
      color: #555;
      font-size: 1.1em;
    }

    img {
      width: 300px;
      border-radius: 20px;
      margin: 20px 0;
    }

    .footer {
      margin-top: 15px;
      font-size: 0.9em;
      color: #888;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Meet Sky ☁️🐱</h1>
    <img src="https://images.unsplash.com/photo-1518791841217-8f162f1e1131" alt="Cute white cat" />
    <p>
      This is Sky, the cutest white cat! Sky loves naps in sunny spots,
      chasing tiny shadows, and watching the world from the window.
    </p>

    <p>
      Favorite activities: sleeping, exploring, and being adorable.
    </p>

    <div class="footer">Made with love for Sky</div>
  </div>
</body>
</html>
